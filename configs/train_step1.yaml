# Hydra config for step1 pretraining

collapse_strategy: ema_stopgrad
model_size: tiny

device: auto
seed: 42
steps: 200
batch_size: 8

lr: 1.0e-4
weight_decay: 0.04
grad_clip: 1.0

height: 240
width: 320
t_bins: 10
patch_size: 16
tubelet_size: 2

temporal_mix:
  enabled: true
  short_t: 1
  image_prob: 0.5
  short_mode: sum  # sum | first | center

predictor_depth: 4
predictor_embed_dim: 384
predictor_heads: null
num_mask_tokens: 2

normalize_voxel: true
normalize_targets: false

recon_loss: smooth_l1

sigreg_weight: 0.0
sigreg_knots: 17
sigreg_proj: 1024

vicreg_std_weight: 0.0
vicreg_cov_weight: 0.0
vicreg_eps: 1.0e-4
vicreg_use_target: false

ema_momentum: 0.996

spatial_mask_min: 0.2
spatial_mask_max: 0.5
temporal_mask_min: 0.5
temporal_mask_max: 1.0
aspect_min: 0.5
aspect_max: 2.0
num_pred_blocks: 1
max_context_frames_ratio: 1.0

print_every: 10
save_every: 100
out_dir: ${hydra:runtime.output_dir}/checkpoints
log_dir: ${hydra:runtime.output_dir}/logs
metrics_file: ${hydra:runtime.output_dir}/logs/train_metrics.csv

logging:
  tensorboard:
    enabled: true
    subdir: tensorboard

eval:
  enabled: false
  every: 100
  steps: 10
  split: val  # train | val | test

scheduler:
  enabled: false
  warmup_steps: 0
  start_lr: 0.0
  final_lr: 1.0e-6
  update_weight_decay: false
  final_weight_decay: ${weight_decay}

distributed:
  enabled: false
  backend: auto  # auto | nccl | gloo
  port: 37129
  timeout_sec: 1800
  broadcast_buffers: false
  find_unused_parameters: false

data:
  source: pretrain_mixed  # pretrain_mixed | synthetic | n_imagenet | dsec
  num_workers: 8
  pin_memory: true
  drop_last: true

  synthetic:
    num_events_min: 2000
    num_events_max: 12000

  n_imagenet:
    split: train  # train | val | test
    train_list: null
    val_list: null
    root_dir: null
    compressed: true
    time_scale: 1000000.0
    limit_samples: null
    limit_classes: null
    sensor_height: 480
    sensor_width: 640
    rescale_to_voxel_grid: true

    slice:
      enabled: false
      mode: random  # idx | time | random
      start: null
      end: null
      length: 30000
      random_on_train: true

    augment:
      enabled: false
      hflip_prob: 0.5
      max_shift: 20

  dsec:
    split: train  # train | val | test
    root_dir: null
    split_config: null  # optional YAML path (required when split=val in official layout)
    sync: back  # front | back
    image_view: distorted  # distorted | rectified
    downsample: false  # false: events.h5, true: downsample_event_file
    downsample_event_file: events_2x.h5

    load_events: true
    load_rgb: false
    load_labels: false

    limit_samples: null
    sensor_height: 480
    sensor_width: 640
    rescale_to_voxel_grid: true

  pretrain_mixed:
    events_per_sample_min: 20000
    events_per_sample_max: 80000

    # Optional random time-window sampling (microseconds) for sequence sources.
    # Set both to enable duration-based slicing.
    window_duration_us_min: 200000
    window_duration_us_max: 1200000
    duration_sources: [dsec, gen4]
    prefer_ms_to_idx: true

    random_slice: true
    time_normalize: true
    use_source_balancing: true
    epoch_size: null
    sampler_seed: 42

    # Common canvas before voxel-grid rescale.
    # 1MPX (320x180) is centered into this canvas by padding when center_pad_to_canvas=true.
    canvas_height: 240
    canvas_width: 320
    center_pad_to_canvas: true
    rescale_to_voxel_grid: true

    weights:
      # weight <= 0 means "exclude this source".
      # Excluded sources are ignored even if enabled=true,
      # and missing root_dir/path will not raise errors.
      dsec: 1.0
      gen4: 1.0
      n_imagenet: 1.0

    dsec:
      enabled: true
      root_dir: ./dsec-downsampled
      splits: [train]
      recursive: true
      file_name: events_2x.h5
      file_suffix: null
      sensor_height: 240
      sensor_width: 320

    gen4:
      enabled: true
      root_dir: ./gen4-downsampled
      splits: [train]
      recursive: true
      file_name: null
      file_suffix: _4x.h5
      sensor_height: 180
      sensor_width: 320

    n_imagenet:
      enabled: true
      root_dir: ./n-imagenet-downsample
      splits: [training]
      recursive: true
      file_name: null
      file_suffix: .h5
      sensor_height: 240
      sensor_width: 320

hydra:
  run:
    dir: ./outputs/train/${now:%Y-%m-%d}/${now:%H-%M-%S}
