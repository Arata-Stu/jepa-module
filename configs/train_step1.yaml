# Hydra config for step1 pretraining

collapse_strategy: ema_stopgrad
model_size: tiny

device: auto
seed: 42
steps: 1000000
batch_size: 16

lr: 1.0e-4
weight_decay: 0.04
grad_clip: 1.0

height: 240
width: 320
t_bins: 10
patch_size: 16
tubelet_size: 2

temporal_mix:
  enabled: true
  short_t: 1
  image_prob: 0.5
  short_mode: sum  # sum | first | center

predictor_depth: 4
predictor_embed_dim: 384
predictor_heads: null
num_mask_tokens: 2

normalize_voxel: true
normalize_targets: false

recon_loss: smooth_l1

context_loss:
  enabled: false
  weight_by_distance: false
  offset_context_loss: false
  distance_eps: 1.0e-6
  lambda_value: 0.5
  lambda_warmup:
    enabled: true
    start_step: 15000
    end_step: 30000

sigreg_weight: 0.0
sigreg_knots: 17
sigreg_proj: 1024

vicreg_std_weight: 0.0
vicreg_cov_weight: 0.0
vicreg_eps: 1.0e-4
vicreg_use_target: false

ema_momentum: 0.996

spatial_mask_min: 0.2
spatial_mask_max: 0.5
temporal_mask_min: 0.5
temporal_mask_max: 1.0
aspect_min: 0.5
aspect_max: 2.0
num_pred_blocks: 1
max_context_frames_ratio: 1.0

print_every: 1000
save_every: 10000
out_dir: ${hydra:runtime.output_dir}/checkpoints
log_dir: ${hydra:runtime.output_dir}/logs
metrics_file: ${hydra:runtime.output_dir}/logs/train_metrics.csv

logging:
  tensorboard:
    enabled: true
    subdir: tensorboard

eval:
  enabled: false
  every: 100
  steps: 10
  split: val  # train | val | test

scheduler:
  enabled: false
  warmup_steps: 0
  start_lr: 0.0
  final_lr: 1.0e-6
  update_weight_decay: false
  final_weight_decay: ${weight_decay}

distributed:
  enabled: false
  backend: auto  # auto | nccl | gloo
  port: 37129
  timeout_sec: 1800
  broadcast_buffers: false
  find_unused_parameters: false

data:
  source: pretrain_mixed  # pretraining default
  num_workers: 8
  pin_memory: false
  drop_last: true
  persistent_workers: true
  prefetch_factor: 2
  sharing_strategy: file_system  # file_system | file_descriptor | null

  pretrain_mixed:
    events_per_sample_min: 20000
    events_per_sample_max: 80000

    # Optional random time-window sampling (microseconds) for sequence sources.
    # Set both to enable duration-based slicing.
    window_duration_us_min: 10000 # 10ms
    window_duration_us_max: 100000 # 100ms
    duration_sources: [dsec, gen4]
    prefer_ms_to_idx: true
    # Low-activity window filtering (useful for stopped scenes, e.g. Gen4 traffic-light stop).
    # If a sampled window does not satisfy conditions, the loader resamples another window
    # from the same file up to max_window_attempts.
    min_events_in_window: 1
    min_event_rate_eps: null
    activity_filter_sources: [gen4]
    max_window_attempts: 4

    random_slice: true
    time_normalize: true
    use_source_balancing: true
    epoch_size: null
    sampler_seed: 42

    augment:
      enabled: false
      hflip_prob: 0.5
      max_shift: 8
      time_flip_prob: 0.0
      polarity_flip_prob: 0.0
      random_resized_crop:
        enabled: false
        prob: 0.5
        scale_min: 0.8
        scale_max: 1.0
        aspect_min: 0.75
        aspect_max: 1.3333333333333333
        attempts: 10
        preserve_aspect: true

    # Common canvas before voxel-grid rescale.
    # 1MPX (320x180) is centered into this canvas by padding when center_pad_to_canvas=true.
    canvas_height: 240
    canvas_width: 320
    center_pad_to_canvas: true
    rescale_to_voxel_grid: true

    weights:
      # weight <= 0 means "exclude this source".
      # Excluded sources are ignored even if enabled=true,
      # and missing root_dir/path will not raise errors.
      # Positive weights are normalized and used as sampling probabilities
      # over many samples (expected ratio), not strict per-batch ratios.
      dsec: 1.0
      gen4: 1.0
      n_imagenet: 1.0

    dsec:
      enabled: true
      root_dir: /media/aten-22/AT_2TB/dataset/dsec-downsampled
      manifest_file: manifests/dsec_train.txt  # optional path list (.txt/.csv/.npy). When set, avoids directory scan.
      splits: [train]
      recursive: true
      file_name: events_2x.h5
      file_suffix: null
      sensor_height: 240
      sensor_width: 320

    gen4:
      enabled: true
      root_dir: /media/aten-22/AT_2TB/dataset/gen4-downsampled
      manifest_file: manifests/gen4_train.txt  # optional path list (.txt/.csv/.npy). When set, avoids directory scan.
      splits: [train]
      recursive: true
      file_name: null
      file_suffix: _4x.h5
      sensor_height: 180
      sensor_width: 320

    n_imagenet:
      enabled: true
      root_dir: /media/aten-22/AT_2TB/dataset/n-imagenet-downsample
      manifest_file: manifests/n_imagenet_training.txt  # optional path list (.txt/.csv/.npy). When set, avoids directory scan.
      splits: [training]
      recursive: true
      file_name: null
      file_suffix: .h5
      sensor_height: 240
      sensor_width: 320

hydra:
  run:
    dir: ./outputs/train/${now:%Y-%m-%d}/${now:%H-%M-%S}
