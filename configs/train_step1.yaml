# Hydra config for step1 pretraining

collapse_strategy: ema_stopgrad
model_size: tiny

device: auto
seed: 42
steps: 200
batch_size: 8

lr: 1.0e-4
weight_decay: 0.04
grad_clip: 1.0

height: 128
width: 128
t_bins: 8
patch_size: 16
tubelet_size: 2

predictor_depth: 4
predictor_embed_dim: 384
predictor_heads: null
num_mask_tokens: 2

normalize_voxel: false
normalize_targets: false

recon_loss: smooth_l1

sigreg_weight: 0.0
sigreg_knots: 17
sigreg_proj: 1024

vicreg_std_weight: 0.0
vicreg_cov_weight: 0.0
vicreg_eps: 1.0e-4
vicreg_use_target: false

ema_momentum: 0.996

spatial_mask_min: 0.2
spatial_mask_max: 0.5
temporal_mask_min: 0.5
temporal_mask_max: 1.0
aspect_min: 0.5
aspect_max: 2.0
num_pred_blocks: 1
max_context_frames_ratio: 1.0

print_every: 10
save_every: 100
out_dir: ${hydra:runtime.output_dir}/checkpoints
log_dir: ${hydra:runtime.output_dir}/logs
metrics_file: ${hydra:runtime.output_dir}/logs/train_metrics.csv

logging:
  tensorboard:
    enabled: true
    subdir: tensorboard

eval:
  enabled: false
  every: 100
  steps: 10
  split: val  # train | val | test

scheduler:
  enabled: false
  warmup_steps: 0
  start_lr: 0.0
  final_lr: 1.0e-6
  update_weight_decay: false
  final_weight_decay: ${weight_decay}

distributed:
  enabled: false
  backend: auto  # auto | nccl | gloo
  port: 37129
  timeout_sec: 1800
  broadcast_buffers: false
  find_unused_parameters: false

data:
  source: synthetic  # synthetic | n_imagenet | dsec
  num_workers: 4
  pin_memory: true
  drop_last: true

  synthetic:
    num_events_min: 2000
    num_events_max: 12000

  n_imagenet:
    split: train  # train | val | test
    train_list: null
    val_list: null
    root_dir: null
    compressed: true
    time_scale: 1000000.0
    limit_samples: null
    limit_classes: null
    sensor_height: 480
    sensor_width: 640
    rescale_to_voxel_grid: true

    slice:
      enabled: false
      mode: random  # idx | time | random
      start: null
      end: null
      length: 30000
      random_on_train: true

    augment:
      enabled: false
      hflip_prob: 0.5
      max_shift: 20

  dsec:
    split: train  # train | val | test
    root_dir: null
    split_config: null  # optional YAML path (required when split=val in official layout)
    sync: back  # front | back
    image_view: distorted  # distorted | rectified
    downsample: false  # false: events.h5, true: downsample_event_file
    downsample_event_file: events_2x.h5

    load_events: true
    load_rgb: false
    load_labels: false

    limit_samples: null
    sensor_height: 480
    sensor_width: 640
    rescale_to_voxel_grid: true

hydra:
  run:
    dir: ./outputs/train/${now:%Y-%m-%d}/${now:%H-%M-%S}
